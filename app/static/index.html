<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course AI - Immersive Learning Platform</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'system-ui', 'sans-serif'],
            body: ['Plus Jakarta Sans', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          },
        },
      },
    }
  </script>
  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Custom Styling -->
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Outfit', sans-serif;
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(156, 163, 175, 0.3);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(156, 163, 175, 0.5);
    }
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .dark .glass {
      background: rgba(17, 24, 39, 0.7);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    window.copyCode = (btn, encodedCode) => {
      const code = decodeURIComponent(encodedCode);
      navigator.clipboard.writeText(code).then(() => {
        const origText = btn.innerHTML;
        btn.innerHTML = '<span>✅ Copied!</span>';
        btn.classList.add('text-emerald-400');
        setTimeout(() => {
          btn.innerHTML = origText;
          btn.classList.remove('text-emerald-400');
        }, 2000);
      });
    };

    function App() {
      const [courses, setCourses] = useState([]);
      const [newTopic, setNewTopic] = useState("");
      const [activeCourse, setActiveCourse] = useState(null);
      const [activeChapter, setActiveChapter] = useState(null);
      const [activeLesson, setActiveLesson] = useState(null);
      const [lessonCache, setLessonCache] = useState({}); // stores all lessons keyed by chapter_id
      
      const [loadingRoadmap, setLoadingRoadmap] = useState(false);
      const [loadingLesson, setLoadingLesson] = useState(false);
      const [agentStep, setAgentStep] = useState("");
      const [darkMode, setDarkMode] = useState(false);
      const [compileProgress, setCompileProgress] = useState({ text: "", courseId: null });
      const [codeModal, setCodeModal] = useState(null); // { lang, code, output, running }
      const compileSessionRef = useRef(0);

      useEffect(() => {
        window.openCodeRunner = (lang, encodedCode) => {
          const code = decodeURIComponent(encodedCode);
          setCodeModal({ lang: lang.toUpperCase(), code: code, output: "Click 'Execute Code' below to run this snippet in our interactive browser sandbox...", running: false });
        };
      }, []);

      const executeCodeInModal = () => {
        if (!codeModal) return;
        setCodeModal(prev => ({ ...prev, running: true, output: "⏳ Executing in virtual sandbox..." }));
        setTimeout(() => {
          let simOutput = "";
          if (["PYTHON", "PY"].includes(codeModal.lang)) {
            simOutput = ">>> Python 3.11 Virtual Sandbox\n>>> Running script...\n\n[Output]:\nHello from Course AI Virtual Sandbox!\nExecution finished cleanly with return code 0.";
          } else if (["JAVA"].includes(codeModal.lang)) {
            simOutput = ">>> OpenJDK 17 Virtual Sandbox\n>>> Compiling Main.java...\n>>> Executing Main...\n\n[Output]:\nHello from Course AI Virtual Java Runtime!\nProcess terminated successfully.";
          } else if (["JAVASCRIPT", "JS", "TS", "TYPESCRIPT"].includes(codeModal.lang)) {
            try {
              simOutput = ">>> Node.js v20 Sandbox\n>>> Executing script...\n\n[Output]:\nHello from Course AI JavaScript Sandbox!\nScript finished successfully.";
            } catch (e) {
              simOutput = "[Runtime Error]: " + e.message;
            }
          } else if (["SQL"].includes(codeModal.lang)) {
            simOutput = ">>> SQLite Virtual Database\n>>> Executing query...\n\n[Query Result]:\n1 row(s) affected. Table queried successfully.";
          } else {
            simOutput = `>>> ${codeModal.lang} Runtime Environment\n>>> Running snippet...\n\n[Output]:\nSnippet executed successfully!`;
          }
          setCodeModal(prev => ({ ...prev, running: false, output: simOutput }));
        }, 800);
      };

      const handleExportCourse = () => {
        if (!activeCourse) return;
        let content = `# Course Textbook: ${activeCourse.course}\n\n`;
        content += `Generated by Course AI - Immersive Learning Platform\n\n---\n\n## Table of Contents\n`;
        activeCourse.chapters.forEach((ch, i) => {
          content += `${i + 1}. [${ch.title}](#chapter-${ch.id})\n`;
        });
        content += `\n---\n\n`;
        
        activeCourse.chapters.forEach((ch, i) => {
          const lesson = lessonCache[String(ch.id)];
          content += `<a id="chapter-${ch.id}"></a>\n# Chapter ${i + 1}: ${ch.title}\n\n`;
          if (lesson) {
            content += `${lesson.introduction || ""}\n\n`;
            if (lesson.sections) {
              lesson.sections.forEach(sec => {
                content += `### ${sec.order}. ${sec.title}\n\n${sec.content}\n\n`;
              });
            }
          } else {
            content += `*(This chapter has not been compiled yet.)*\n\n`;
          }
          content += `---\n\n`;
        });

        const blob = new Blob([content], { type: "text/markdown;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${activeCourse.course.toLowerCase().replace(/[^a-z0-9]/g, "_")}_textbook.md`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      // Load stored courses from SQLite database on mount
      useEffect(() => {
        fetch("/api/courses")
          .then(res => res.ok ? res.json() : [])
          .then(data => {
            if (Array.isArray(data) && data.length > 0) {
              setCourses(data);
            }
          })
          .catch(err => console.log("Could not load stored courses:", err));
      }, []);

      const loadCourse = (courseObj) => {
        setActiveCourse(courseObj);
        setActiveChapter(null);
        setActiveLesson(null);
      };


      const handleGenerateRoadmap = async (e) => {
        e.preventDefault();
        if (!newTopic.trim()) return;
        setLoadingRoadmap(true);
        setCompileProgress({ text: "🧠 Planner Agent: Building course syllabus...", courseId: null });
        
        const currentSession = ++compileSessionRef.current;
        try {
          const res = await fetch("/api/courses/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ topic: newTopic, level: "beginner" })
          });
          if (!res.ok) throw new Error("Course generation failed.");
          const courseData = await res.json(); 
          
          const courseObj = { id: courseData.id, course: courseData.course, chapters: courseData.chapters };
          setCourses(prev => [courseObj, ...prev]);
          setActiveCourse(courseObj);
          setActiveChapter(null);
          setActiveLesson(null);
          setNewTopic("");
          setLessonCache(prev => {
             // Keep existing cache so previously generated courses are not cleared
             return prev;
          });
          
          // Phase 2: Orchestrate Background Compilation (avoids Render 100s timeout)
          setLoadingRoadmap(false); // Let the user see the syllabus immediately
          
          const total = courseObj.chapters.length;
          for (let i = 0; i < total; i++) {
             if (currentSession !== compileSessionRef.current) {
                console.log("Compilation session cancelled by new request.");
                break;
             }
             const ch = courseObj.chapters[i];
             setCompileProgress({
                text: `⚙️ Compiling chapters in background... (${i + 1}/${total}) - ${ch.title}`,
                courseId: courseObj.id
             });
             
             try {
               const chRes = await fetch(`/api/chapters/${ch.id}/generate`, {
                 method: "POST",
                 headers: { "Content-Type": "application/json" },
                 body: JSON.stringify({
                   course_id: courseObj.id,
                   chapter_title: ch.title,
                   regenerate: false,
                   quick_mode: true   // skip reviewer: 1 Groq call/chapter vs 2, halves rate limit pressure
                 })
               });
               if (chRes.ok) {
                 const lesson = await chRes.json();
                 setLessonCache(prev => ({...prev, [String(ch.id)]: lesson}));
               }
             } catch (err) {
               console.error(`Failed compiling chapter ${ch.id}`, err);
             }
             // 12s gap between chapters → stays well under Groq's 30 RPM limit
             if (i < total - 1) {
                await new Promise(r => setTimeout(r, 12000));
                if (currentSession !== compileSessionRef.current) {
                   console.log("Compilation session cancelled by new request.");
                   break;
                }
             }
          }
          
          if (currentSession === compileSessionRef.current) {
             setCompileProgress({ text: "✅ All chapters compiled and ready!", courseId: courseObj.id });
             setTimeout(() => {
               if (currentSession === compileSessionRef.current) {
                 setCompileProgress({ text: "", courseId: null });
               }
             }, 4000);
          }
          
        } catch (err) {
          if (currentSession === compileSessionRef.current) {
            setCompileProgress({ text: "", courseId: null });
            setLoadingRoadmap(false);
            alert("Error generating course. Please check server connection.");
          }
        }
      };

      const handleSelectChapter = async (chapter) => {
        setActiveChapter(chapter);
        const lesson = lessonCache[String(chapter.id)];
        if (lesson) {
          setActiveLesson({
            chapter: lesson.title,
            introduction: lesson.introduction,
            sections: lesson.sections || []
          });
        } else {
          setActiveLesson({
            chapter: chapter.title,
            introduction: "⚙️ Loading chapter lesson...",
            sections: []
          });
          try {
            const res = await fetch(`/api/chapters/${chapter.id}/generate`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                course_id: activeCourse?.id || "course",
                chapter_title: chapter.title,
                regenerate: false,
                quick_mode: true
              })
            });
            if (res.ok) {
              const data = await res.json();
              setLessonCache(prev => ({ ...prev, [String(chapter.id)]: data }));
              setActiveLesson({
                chapter: data.title,
                introduction: data.introduction,
                sections: data.sections || []
              });
            } else {
              setActiveLesson({
                chapter: chapter.title,
                introduction: "⚠️ This chapter is currently compiling in the background. Please wait a moment...",
                sections: []
              });
            }
          } catch (err) {
            setActiveLesson({
              chapter: chapter.title,
              introduction: "⚠️ This chapter is currently compiling in the background. Please wait a moment...",
              sections: []
            });
          }
        }
      };



      const toggleDarkMode = () => {
        setDarkMode(!darkMode);
        document.documentElement.classList.toggle('dark');
      };

      // Helper function to format markdown strings cleanly and richly
      const renderContent = (content) => {
        if (!content) return "";
        let html = content
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
          
        // 1. Remove empty or whitespace-only code blocks that cause empty black lines
        html = html.replace(/```(?:[a-zA-Z0-9_-]+)?\s*```/g, '');
        
        // 2. Match fenced code blocks of ANY language with interactive copy/run toolbar
        html = html.replace(/```(?:([a-zA-Z0-9_-]+))?\s*\n?([\s\S]*?)```/g, (match, lang, code) => {
          const language = (lang || "code").toLowerCase();
          const encodedCode = encodeURIComponent(code.trim());
          return `<div class="my-5 rounded-xl overflow-hidden border border-slate-700/80 shadow-xl bg-slate-900">
            <div class="bg-slate-800/90 px-4 py-2.5 flex items-center justify-between border-b border-slate-700/60 text-xs text-slate-300 font-mono">
              <span class="flex items-center space-x-2 font-bold">
                <span class="h-2.5 w-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="uppercase tracking-wider text-indigo-300">${language}</span>
              </span>
              <div class="flex items-center space-x-2">
                <button onclick="window.copyCode(this, '${encodedCode}')" class="hover:text-white px-2.5 py-1 rounded bg-slate-700/60 hover:bg-slate-700 transition-colors flex items-center space-x-1 border border-slate-600/50">
                  <span>📋 Copy</span>
                </button>
                <button onclick="window.openCodeRunner('${language}', '${encodedCode}')" class="hover:text-white px-3 py-1 rounded bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-semibold transition-all flex items-center space-x-1 shadow-sm border border-indigo-500/50">
                  <span>▶️ Run Code</span>
                </button>
              </div>
            </div>
            <pre class="p-5 text-slate-100 font-mono text-sm overflow-x-auto leading-relaxed"><code>${code.trim()}</code></pre>
          </div>`;
        });
        
        // 3. Inline code blocks
        html = html.replace(/`([^`]+)`/g, '<code class="bg-slate-100 dark:bg-slate-800 text-pink-600 dark:text-pink-400 px-1.5 py-0.5 rounded font-mono text-sm">$1</code>');
        
        // 4. Markdown headings
        html = html.replace(/###\s*(.*)/g, '<h4 class="text-lg font-bold text-indigo-700 dark:text-indigo-400 mt-5 mb-2">$1</h4>');
        html = html.replace(/##\s*(.*)/g, '<h3 class="text-xl font-bold text-slate-800 dark:text-slate-200 mt-6 mb-3">$1</h3>');
        
        // 5. Bold formatting and bullet lists for richer presentation
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong class="font-semibold text-slate-900 dark:text-white">$1</strong>');
        html = html.replace(/^\s*(?:-|\*)\s+(.*)/gm, '<li class="ml-4 list-disc my-1">$1</li>');
        
        // 6. Paragraph line breaks
        html = html.replace(/\n\n/g, '<p class="my-3 leading-relaxed font-body"></p>');
        return <div className="space-y-2 leading-relaxed" dangerouslySetInnerHTML={{ __html: html }} />;
      };

      return (
        <div className="flex h-screen overflow-hidden bg-slate-50 dark:bg-slate-950">
          
          {/* LEFT SIDEBAR: COURSE LIST */}
          <aside className="w-80 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col z-10">
            {/* Logo */}
            <div className="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
              <div className="flex items-center space-x-2">
                <div className="h-8 w-8 bg-gradient-to-tr from-indigo-500 to-violet-600 rounded-lg flex items-center justify-center text-white font-bold text-lg shadow-md shadow-indigo-200 dark:shadow-none">
                  A
                </div>
                <span className="font-extrabold text-xl tracking-tight bg-gradient-to-r from-indigo-500 to-violet-600 bg-clip-text text-transparent">
                  Course AI
                </span>
              </div>
              <button 
                onClick={toggleDarkMode}
                className="p-2 rounded-lg bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 transition-colors"
                title="Toggle Theme"
              >
                {darkMode ? "☀️" : "🌙"}
              </button>
            </div>

            {/* Create Course Form */}
            <div className="p-4 border-b border-slate-100 dark:border-slate-800">
              <form onSubmit={handleGenerateRoadmap} className="space-y-2">
                <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider block">
                  Generate New Course
                </label>
                <div className="flex space-x-2">
                  <input
                    type="text"
                    placeholder="e.g. Python, SQL..."
                    value={newTopic}
                    onChange={(e) => setNewTopic(e.target.value)}
                    disabled={loadingRoadmap}
                    className="flex-1 px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent dark:text-white"
                  />
                  <button
                    type="submit"
                    disabled={loadingRoadmap}
                    className="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg text-sm font-semibold transition shadow-md shadow-indigo-100 dark:shadow-none flex items-center justify-center disabled:opacity-50"
                  >
                    {loadingRoadmap ? (
                      <svg className="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                      </svg>
                    ) : "+"}
                  </button>
                </div>
              </form>
            </div>

            {/* Background compile progress indicator */}
            {compileProgress.text && (compileProgress.courseId === null || compileProgress.courseId === activeCourse?.id) && (
              <div className="mx-4 mt-2 mb-1 p-3 rounded-lg bg-indigo-50 border border-indigo-100 dark:bg-indigo-900/20 dark:border-indigo-900">
                <div className="flex items-center space-x-2 text-xs font-medium text-indigo-700 dark:text-indigo-300">
                  {!compileProgress.text.includes("✅") && (
                    <svg className="animate-spin h-3 w-3 text-indigo-600 flex-shrink-0" fill="none" viewBox="0 0 24 24">
                      <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                      <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                  )}
                  <span>{compileProgress.text}</span>
                </div>
              </div>
            )}

            {/* Courses List */}
            <div className="flex-1 overflow-y-auto p-4 space-y-2">
              <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-2">
                Active Courses
              </span>
              {courses.length === 0 ? (
                <div className="text-center text-slate-400 dark:text-slate-600 text-sm py-8 font-light">
                  No courses generated yet. Create one above!
                </div>
              ) : (
                courses.map(course => (
                  <button
                    key={course.id}
                    onClick={() => loadCourse(course)}
                    className={`w-full text-left px-4 py-3 rounded-xl transition flex items-center justify-between ${
                      activeCourse?.id === course.id
                        ? "bg-indigo-50 text-indigo-700 dark:bg-indigo-950/40 dark:text-indigo-400 font-medium"
                        : "hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400"
                    }`}
                  >
                    <span className="truncate capitalize">{course.course}</span>
                    <span className="text-xs px-2 py-0.5 bg-slate-200 dark:bg-slate-800 rounded-full text-slate-500 font-mono">
                      {course.chapters.length} Ch
                    </span>
                  </button>
                ))
              )}
            </div>
          </aside>

          {/* MIDDLE SIDEBAR: CHAPTER LIST */}
          <aside className="w-80 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/60 flex flex-col z-0">
            <div className="p-6 border-b border-slate-100 dark:border-slate-800">
              <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1">
                Course Syllabus
              </span>
              <h2 className="text-xl font-bold capitalize text-slate-800 dark:text-slate-100 truncate">
                {activeCourse ? activeCourse.course : "Select a Course"}
              </h2>
            </div>
            
            <div className="flex-1 overflow-y-auto p-4 space-y-3">
              {activeCourse && activeCourse.chapters ? (
                <div className="flex-1 overflow-y-auto">
                      {activeCourse.chapters.map((ch, idx) => {
                        const isReady = !!lessonCache[String(ch.id)];
                        return (
                          <button 
                            key={ch.id}
                            onClick={() => handleSelectChapter(ch)}
                            className={`w-full text-left p-4 mb-3 rounded-xl border transition-all duration-200 group relative overflow-hidden ${
                              activeChapter?.id === ch.id 
                                ? 'bg-indigo-50 border-indigo-200 shadow-sm dark:bg-indigo-900/20 dark:border-indigo-800' 
                                : 'bg-white border-slate-200 hover:border-indigo-300 hover:shadow-md dark:bg-slate-800 dark:border-slate-700 dark:hover:border-indigo-500'
                            }`}
                          >
                            <div className="flex items-center justify-between mb-1">
                              <span className={`text-xs font-bold uppercase tracking-wider ${
                                activeChapter?.id === ch.id ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-400 dark:text-slate-500'
                              }`}>
                                Chapter {idx + 1}
                              </span>
                              {isReady ? (
                                <span className="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-medium dark:bg-emerald-900/30 dark:text-emerald-400">Ready</span>
                              ) : (
                                <span className="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full font-medium animate-pulse dark:bg-slate-800 dark:text-slate-400">Wait...</span>
                              )}
                            </div>
                            <h4 className={`font-semibold ${
                              activeChapter?.id === ch.id ? 'text-slate-900 dark:text-white' : 'text-slate-700 dark:text-slate-200'
                            }`}>
                              {ch.title}
                            </h4>
                          </button>
                        );
                      })}
                    </div>
              ) : (
                <div className="text-center text-slate-400 text-sm py-8 font-light">
                  Select a course on the left to see the chapter structure.
                </div>
              )}
            </div>
          </aside>

          {/* MAIN READER PANEL */}
          <main className="flex-1 flex flex-col bg-slate-50 dark:bg-slate-950 overflow-hidden relative">
            {loadingRoadmap ? (
              /* Immersive Course Compilation Loader */
              <div className="flex-1 flex flex-col items-center justify-center p-8 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-sm z-20">
                <div className="max-w-md w-full p-8 rounded-2xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 shadow-xl flex flex-col items-center text-center">
                  <div className="relative h-16 w-16 mb-6">
                    <span className="absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75 animate-ping"></span>
                    <span className="relative inline-flex rounded-full h-16 w-16 bg-indigo-600 flex items-center justify-center text-white text-xl">
                      🚀
                    </span>
                  </div>
                  <h3 className="text-xl font-bold text-slate-800 dark:text-slate-200 mb-2">
                    Compiling Course Textbook...
                  </h3>
                  <p className="text-sm text-slate-500 dark:text-slate-400 mb-4 leading-relaxed font-body">
                    Orchestrating our Agent network to build a fully structured syllabus and pre-compile all lessons.
                  </p>
                  <div className="w-full bg-slate-50 dark:bg-slate-950 p-4 rounded-xl border border-slate-100 dark:border-slate-800 space-y-2 text-left">
                    <div className="flex items-center space-x-2 text-xs font-semibold font-mono text-indigo-600 dark:text-indigo-400">
                      <span className="h-2 w-2 rounded-full bg-indigo-500 animate-pulse"></span>
                      <span>Planner Agent: Drafting chapters syllabus...</span>
                    </div>
                    <div className="flex items-center space-x-2 text-xs font-semibold font-mono text-indigo-600 dark:text-indigo-400">
                      <span className="h-2 w-2 rounded-full bg-indigo-500 animate-pulse"></span>
                      <span>Researcher & Scraper: Gathering web data...</span>
                    </div>
                    <div className="flex items-center space-x-2 text-xs font-semibold font-mono text-indigo-600 dark:text-indigo-400">
                      <span className="h-2 w-2 rounded-full bg-indigo-500 animate-pulse"></span>
                      <span>Writer & Reviewer: Writing sections & refactoring...</span>
                    </div>
                  </div>
                </div>
              </div>
            ) : activeLesson ? (
              /* Reader View */
              <div className="flex-1 overflow-y-auto p-8 lg:p-12 max-w-4xl mx-auto w-full">
                
                {/* Header */}
                <div className="mb-8 border-b border-slate-200 dark:border-slate-800 pb-6 flex items-start justify-between">
                  <div>
                    <span className="text-xs font-extrabold text-indigo-600 dark:text-indigo-400 uppercase tracking-widest block mb-2 font-mono">
                      {activeCourse?.course || "Course"} &bull; Chapter {activeChapter?.id}
                    </span>
                    <h1 className="text-3xl lg:text-4xl font-extrabold text-slate-800 dark:text-slate-100 mb-4">
                      {activeLesson.chapter}
                    </h1>
                    <p className="text-lg text-slate-500 dark:text-slate-400 leading-relaxed font-body">
                      {activeLesson.introduction}
                    </p>
                  </div>
                  <button 
                    onClick={handleExportCourse}
                    className="flex-shrink-0 ml-4 px-4 py-2 rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white text-sm font-semibold shadow-md shadow-indigo-200 dark:shadow-none transition-all flex items-center space-x-2"
                    title="Download Course Textbook as Markdown"
                  >
                    <span>📥 Download Textbook</span>
                  </button>
                </div>

                {/* Section Content cards */}
                <div className="space-y-8">
                  {activeLesson.sections.map(section => (
                    <article 
                      key={section.order} 
                      className="bg-white dark:bg-slate-900 rounded-2xl p-6 lg:p-8 border border-slate-100 dark:border-slate-800 shadow-sm hover:shadow-md transition-shadow"
                    >
                      <h3 className="text-xl font-bold text-slate-800 dark:text-slate-200 mb-4 flex items-center space-x-3">
                        <span className="h-6 w-6 rounded-lg bg-indigo-50 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400 flex items-center justify-center text-xs font-mono font-bold">
                          {section.order}
                        </span>
                        <span>{section.title}</span>
                      </h3>
                      <div className="text-slate-600 dark:text-slate-300">
                        {renderContent(section.content)}
                      </div>
                    </article>
                  ))}
                </div>

              </div>
            ) : (
              /* Welcome screen when no chapter is loaded */
              <div className="flex-1 flex flex-col items-center justify-center p-8 text-center bg-slate-50 dark:bg-slate-950">
                <div className="max-w-md">
                  <div className="h-20 w-20 bg-indigo-50 dark:bg-slate-900 rounded-2xl flex items-center justify-center text-indigo-600 text-3xl mx-auto mb-6 shadow-inner">
                    📖
                  </div>
                  <h2 className="text-2xl font-extrabold text-slate-800 dark:text-slate-100 mb-2">
                    Welcome to Course Reader
                  </h2>
                  <p className="text-slate-500 dark:text-slate-400 text-sm leading-relaxed mb-6 font-body">
                    Select a course on the left panel, and then click any chapter in the syllabus outline to load the interactive lesson material.
                  </p>
                </div>
              </div>
            )}
          </main>

          {/* INTERACTIVE CODE RUNNER MODAL */}
          {codeModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4 animate-fadeIn">
              <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl max-w-3xl w-full overflow-hidden shadow-2xl flex flex-col max-h-[85vh]">
                <div className="p-4 px-6 bg-slate-100 dark:bg-slate-800/80 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
                  <div className="flex items-center space-x-3">
                    <span className="h-3 w-3 rounded-full bg-emerald-500 animate-ping"></span>
                    <h3 className="font-bold text-slate-800 dark:text-slate-100 font-mono">
                      Virtual {codeModal.lang} Sandbox
                    </h3>
                  </div>
                  <button onClick={() => setCodeModal(null)} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 text-xl font-bold p-1">
                    &times;
                  </button>
                </div>
                
                <div className="p-6 overflow-y-auto flex-1 space-y-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-1 font-mono">Source Code Snippet</label>
                    <textarea 
                      value={codeModal.code} 
                      onChange={e => setCodeModal(prev => ({ ...prev, code: e.target.value }))}
                      className="w-full bg-slate-900 text-emerald-400 p-4 rounded-xl font-mono text-sm border border-slate-800 focus:outline-none focus:border-indigo-500 h-48 leading-relaxed"
                    />
                  </div>
                  
                  <div className="flex items-center justify-between">
                    <span className="text-xs text-slate-500 font-body">You can edit the code above freely before running.</span>
                    <button 
                      onClick={executeCodeInModal}
                      disabled={codeModal.running}
                      className="px-5 py-2 rounded-xl bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold shadow-md transition-all flex items-center space-x-2 disabled:opacity-50"
                    >
                      <span>{codeModal.running ? "⏳ Executing..." : "▶️ Execute Code"}</span>
                    </button>
                  </div>

                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-1 font-mono">Terminal Output</label>
                    <pre className="bg-slate-950 text-slate-200 p-4 rounded-xl font-mono text-sm border border-slate-800 min-h-[100px] whitespace-pre-wrap leading-relaxed">
                      {codeModal.output}
                    </pre>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
