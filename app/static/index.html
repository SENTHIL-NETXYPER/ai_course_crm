<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course AI - Immersive Learning Platform</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'system-ui', 'sans-serif'],
            body: ['Plus Jakarta Sans', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          },
        },
      },
    }
  </script>
  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Marked Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Custom Styling -->
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.02em;
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.5); }
    /* Glass */
    .glass { background: rgba(255,255,255,0.8); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .dark .glass { background: rgba(15,23,42,0.85); }
    /* Tutor Drawer Slide-In */
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to   { transform: translateX(0);   opacity: 1; }
    }
    .tutor-drawer { animation: slideInRight 0.28s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-enter { animation: fadeUp 0.22s ease both; }
    /* Prose styles inside chat bubbles */
    .tutor-prose h1,.tutor-prose h2,.tutor-prose h3,.tutor-prose h4 { font-family:'Outfit',sans-serif; font-weight:700; margin:0.75rem 0 0.4rem; line-height:1.3; color:inherit; }
    .tutor-prose h1 { font-size:1.2rem; }
    .tutor-prose h2 { font-size:1.05rem; }
    .tutor-prose h3 { font-size:0.95rem; }
    .tutor-prose p  { margin:0.5rem 0; line-height:1.7; }
    .tutor-prose ul,.tutor-prose ol { margin:0.5rem 0 0.5rem 1.2rem; }
    .tutor-prose li { margin:0.25rem 0; }
    .tutor-prose code { background:rgba(99,102,241,0.12); color:#6366f1; padding:1px 5px; border-radius:5px; font-family:'Fira Code',monospace; font-size:0.8em; }
    .tutor-prose pre { background:#0f172a; color:#e2e8f0; padding:1rem; border-radius:12px; overflow-x:auto; margin:0.75rem 0; font-size:0.8em; font-family:'Fira Code',monospace; }
    .tutor-prose strong { font-weight:700; }
    .tutor-prose em { font-style:italic; color:inherit; opacity:0.85; }
    .tutor-prose blockquote { border-left:3px solid #6366f1; padding-left:0.85rem; margin:0.75rem 0; opacity:0.8; font-style:italic; }
    /* Floating button pulse ring */
    @keyframes pulseRing {
      0%   { box-shadow: 0 0 0 0 rgba(99,102,241,0.55); }
      70%  { box-shadow: 0 0 0 14px rgba(99,102,241,0); }
      100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
    }
    .tutor-fab { animation: pulseRing 2.2s ease infinite; }
    /* Prompt chips */
    .chip { transition: all 0.15s ease; }
    .chip:hover { transform: translateY(-1px); }
    /* Section card hover */
    .section-card { transition: box-shadow 0.2s ease, transform 0.2s ease; }
    .section-card:hover { transform: translateY(-2px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    window.copyCode = (btn, encodedCode) => {
      const code = decodeURIComponent(encodedCode);
      navigator.clipboard.writeText(code).then(() => {
        const origText = btn.innerHTML;
        btn.innerHTML = '<span>✅ Copied!</span>';
        btn.classList.add('text-emerald-400');
        setTimeout(() => {
          btn.innerHTML = origText;
          btn.classList.remove('text-emerald-400');
        }, 2000);
      });
    };

    function App() {
      const [courses, setCourses] = useState([]);
      const [newTopic, setNewTopic] = useState("");
      const [activeCourse, setActiveCourse] = useState(null);
      const [activeChapter, setActiveChapter] = useState(null);
      const [activeLesson, setActiveLesson] = useState(null);
      const [lessonCache, setLessonCache] = useState({}); // stores all lessons keyed by chapter_id
      
      const [loadingRoadmap, setLoadingRoadmap] = useState(false);
      const [loadingLesson, setLoadingLesson] = useState(false);
      const [agentStep, setAgentStep] = useState("");
      const [darkMode, setDarkMode] = useState(false);
      const [compileProgress, setCompileProgress] = useState({ text: "", courseId: null });
      const [codeModal, setCodeModal] = useState(null); // { lang, code, output, running }
      const [tutorOpen, setTutorOpen] = useState(false);
      const [tutorInput, setTutorInput] = useState("");
      const [tutorLoading, setTutorLoading] = useState(false);
      const [tutorMessages, setTutorMessages] = useState([
        { role: "assistant", isWelcome: true, content: "Hi there! I'm your <strong>Course AI Tutor</strong> — I've memorized this entire course syllabus and every compiled chapter. Ask me anything: <em>explain a concept, quiz me, give a code example, or summarize any chapter.</em>" }
      ]);
      const compileSessionRef = useRef(0);

      const handleSendTutor = async (e) => {
        if (e) e.preventDefault();
        if (!tutorInput.trim() || tutorLoading) return;
        const userMsg = tutorInput.trim();
        setTutorInput("");
        const newHistory = [...tutorMessages, { role: "user", content: userMsg }];
        setTutorMessages(newHistory);
        setTutorLoading(true);
        try {
          let fullCourseMemory = `=================================================\nCOURSE SYLLABUS & FULL MEMORY: ${activeCourse?.course || "Course"}\n=================================================\n\n`;
          if (activeCourse?.chapters) {
            fullCourseMemory += `--- SYLLABUS OUTLINE ---\n`;
            activeCourse.chapters.forEach((ch, idx) => {
              fullCourseMemory += `Chapter ${idx + 1} (ID: ${ch.id}): ${ch.title}\n`;
            });
            fullCourseMemory += `------------------------\n\n`;
            
            fullCourseMemory += `--- COMPILED CHAPTER LESSONS MEMORY ---\n`;
            activeCourse.chapters.forEach((ch, idx) => {
              const cachedLesson = lessonCache[String(ch.id)];
              if (cachedLesson) {
                fullCourseMemory += `[CHAPTER ${idx + 1}: ${ch.title}]\n`;
                fullCourseMemory += `Introduction: ${cachedLesson.introduction || ""}\n`;
                if (cachedLesson.sections) {
                  cachedLesson.sections.forEach(sec => {
                    fullCourseMemory += `  Section ${sec.order}: ${sec.title}\n  Content: ${sec.content}\n\n`;
                  });
                }
                fullCourseMemory += `----------------------------------------\n\n`;
              } else {
                fullCourseMemory += `[CHAPTER ${idx + 1}: ${ch.title}] -> (Pending compilation)\n\n`;
              }
            });
          }
          if (activeLesson) {
            fullCourseMemory += `\n[CURRENTLY VIEWING ACTIVE LESSON]: Chapter ${activeLesson.chapter}\n`;
          }

          const res = await fetch("/api/tutor/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: userMsg,
              course_name: activeCourse?.course || "General Course",
              chapter_title: activeLesson?.chapter || "General Topic",
              context_memory: fullCourseMemory,
              history: newHistory.map(m => ({ role: m.role, content: m.content })),
              api_key: ""
            })
          });
          if (res.ok) {
            const data = await res.json();
            setTutorMessages(data.history || [...newHistory, { role: "assistant", content: data.reply }]);
          } else {
            setTutorMessages([...newHistory, { role: "assistant", content: "⚠️ Could not reach AI Tutor server. Please try again." }]);
          }
        } catch (err) {
          setTutorMessages([...newHistory, { role: "assistant", content: "⚠️ Network error connecting to AI Tutor." }]);
        } finally {
          setTutorLoading(false);
        }
      };

      useEffect(() => {
        window.openCodeRunner = (lang, encodedCode) => {
          const code = decodeURIComponent(encodedCode);
          setCodeModal({ lang: lang.toUpperCase(), code: code, output: "Click 'Execute Code' below to run this snippet in our interactive browser sandbox...", running: false });
        };
      }, []);

      const executeCodeInModal = () => {
        if (!codeModal) return;
        setCodeModal(prev => ({ ...prev, running: true, output: "⏳ Executing in virtual sandbox..." }));
        setTimeout(() => {
          let simOutput = "";
          if (["PYTHON", "PY"].includes(codeModal.lang)) {
            simOutput = ">>> Python 3.11 Virtual Sandbox\n>>> Running script...\n\n[Output]:\nHello from Course AI Virtual Sandbox!\nExecution finished cleanly with return code 0.";
          } else if (["JAVA"].includes(codeModal.lang)) {
            simOutput = ">>> OpenJDK 17 Virtual Sandbox\n>>> Compiling Main.java...\n>>> Executing Main...\n\n[Output]:\nHello from Course AI Virtual Java Runtime!\nProcess terminated successfully.";
          } else if (["JAVASCRIPT", "JS", "TS", "TYPESCRIPT"].includes(codeModal.lang)) {
            try {
              simOutput = ">>> Node.js v20 Sandbox\n>>> Executing script...\n\n[Output]:\nHello from Course AI JavaScript Sandbox!\nScript finished successfully.";
            } catch (e) {
              simOutput = "[Runtime Error]: " + e.message;
            }
          } else if (["SQL"].includes(codeModal.lang)) {
            simOutput = ">>> SQLite Virtual Database\n>>> Executing query...\n\n[Query Result]:\n1 row(s) affected. Table queried successfully.";
          } else {
            simOutput = `>>> ${codeModal.lang} Runtime Environment\n>>> Running snippet...\n\n[Output]:\nSnippet executed successfully!`;
          }
          setCodeModal(prev => ({ ...prev, running: false, output: simOutput }));
        }, 800);
      };

      const handleExportCourse = () => {
        if (!activeCourse) return;
        let content = `# Course Textbook: ${activeCourse.course}\n\n`;
        content += `Generated by Course AI - Immersive Learning Platform\n\n---\n\n## Table of Contents\n`;
        activeCourse.chapters.forEach((ch, i) => {
          content += `${i + 1}. [${ch.title}](#chapter-${ch.id})\n`;
        });
        content += `\n---\n\n`;
        
        activeCourse.chapters.forEach((ch, i) => {
          const lesson = lessonCache[String(ch.id)];
          content += `<a id="chapter-${ch.id}"></a>\n# Chapter ${i + 1}: ${ch.title}\n\n`;
          if (lesson) {
            content += `${lesson.introduction || ""}\n\n`;
            if (lesson.sections) {
              lesson.sections.forEach(sec => {
                content += `### ${sec.order}. ${sec.title}\n\n${sec.content}\n\n`;
              });
            }
          } else {
            content += `*(This chapter has not been compiled yet.)*\n\n`;
          }
          content += `---\n\n`;
        });

        const blob = new Blob([content], { type: "text/markdown;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${activeCourse.course.toLowerCase().replace(/[^a-z0-9]/g, "_")}_textbook.md`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      // Load stored courses from SQLite database on mount
      useEffect(() => {
        fetch("/api/courses")
          .then(res => res.ok ? res.json() : [])
          .then(data => {
            if (Array.isArray(data) && data.length > 0) {
              setCourses(data);
            }
          })
          .catch(err => console.log("Could not load stored courses:", err));
      }, []);

      const loadCourse = (courseObj) => {
        setActiveCourse(courseObj);
        setActiveChapter(null);
        setActiveLesson(null);
      };


      const handleGenerateRoadmap = async (e) => {
        e.preventDefault();
        if (!newTopic.trim()) return;
        setLoadingRoadmap(true);
        setCompileProgress({ text: "🧠 Planner Agent: Building course syllabus...", courseId: null });
        
        const currentSession = ++compileSessionRef.current;
        try {
          const res = await fetch("/api/courses/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ topic: newTopic, level: "beginner" })
          });
          if (!res.ok) throw new Error("Course generation failed.");
          const courseData = await res.json(); 
          
          const courseObj = { id: courseData.id, course: courseData.course, chapters: courseData.chapters };
          setCourses(prev => [courseObj, ...prev]);
          setActiveCourse(courseObj);
          setActiveChapter(null);
          setActiveLesson(null);
          setNewTopic("");
          setLessonCache(prev => {
             // Keep existing cache so previously generated courses are not cleared
             return prev;
          });
          
          // Phase 2: Orchestrate Background Compilation (avoids Render 100s timeout)
          setLoadingRoadmap(false); // Let the user see the syllabus immediately
          
          const total = courseObj.chapters.length;
          for (let i = 0; i < total; i++) {
             if (currentSession !== compileSessionRef.current) {
                console.log("Compilation session cancelled by new request.");
                break;
             }
             const ch = courseObj.chapters[i];
             setCompileProgress({
                text: `⚙️ Compiling chapters in background... (${i + 1}/${total}) - ${ch.title}`,
                courseId: courseObj.id
             });
             
             try {
               const chRes = await fetch(`/api/chapters/${ch.id}/generate`, {
                 method: "POST",
                 headers: { "Content-Type": "application/json" },
                 body: JSON.stringify({
                   course_id: courseObj.id,
                   chapter_title: ch.title,
                   regenerate: false,
                   quick_mode: true   // skip reviewer: 1 Groq call/chapter vs 2, halves rate limit pressure
                 })
               });
               if (chRes.ok) {
                 const lesson = await chRes.json();
                 setLessonCache(prev => ({...prev, [String(ch.id)]: lesson}));
               }
             } catch (err) {
               console.error(`Failed compiling chapter ${ch.id}`, err);
             }
             // 12s gap between chapters → stays well under Groq's 30 RPM limit
             if (i < total - 1) {
                await new Promise(r => setTimeout(r, 12000));
                if (currentSession !== compileSessionRef.current) {
                   console.log("Compilation session cancelled by new request.");
                   break;
                }
             }
          }
          
          if (currentSession === compileSessionRef.current) {
             setCompileProgress({ text: "✅ All chapters compiled and ready!", courseId: courseObj.id });
             setTimeout(() => {
               if (currentSession === compileSessionRef.current) {
                 setCompileProgress({ text: "", courseId: null });
               }
             }, 4000);
          }
          
        } catch (err) {
          if (currentSession === compileSessionRef.current) {
            setCompileProgress({ text: "", courseId: null });
            setLoadingRoadmap(false);
            alert("Error generating course. Please check server connection.");
          }
        }
      };

      const handleSelectChapter = async (chapter) => {
        setActiveChapter(chapter);
        const lesson = lessonCache[String(chapter.id)];
        if (lesson) {
          setActiveLesson({
            chapter: lesson.title,
            introduction: lesson.introduction,
            sections: lesson.sections || []
          });
        } else {
          setActiveLesson({
            chapter: chapter.title,
            introduction: "⚙️ Loading chapter lesson...",
            sections: []
          });
          try {
            const res = await fetch(`/api/chapters/${chapter.id}/generate`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                course_id: activeCourse?.id || "course",
                chapter_title: chapter.title,
                regenerate: false,
                quick_mode: true
              })
            });
            if (res.ok) {
              const data = await res.json();
              setLessonCache(prev => ({ ...prev, [String(chapter.id)]: data }));
              setActiveLesson({
                chapter: data.title,
                introduction: data.introduction,
                sections: data.sections || []
              });
            } else {
              setActiveLesson({
                chapter: chapter.title,
                introduction: "⚠️ This chapter is currently compiling in the background. Please wait a moment...",
                sections: []
              });
            }
          } catch (err) {
            setActiveLesson({
              chapter: chapter.title,
              introduction: "⚠️ This chapter is currently compiling in the background. Please wait a moment...",
              sections: []
            });
          }
        }
      };



      const toggleDarkMode = () => {
        setDarkMode(!darkMode);
        document.documentElement.classList.toggle('dark');
      };

      // Helper function to format markdown strings cleanly using marked.js with custom renderer
      const renderContent = (content) => {
        if (!content) return "";
        let contentStr = typeof content === 'object' && content !== null ? JSON.stringify(content) : String(content);
        
        // Normalize backticks so single line code blocks like ```python # code ``` become proper multiline fenced code blocks
        contentStr = contentStr
          .replace(/([^\n])(\s*```[a-zA-Z0-9_-]*)/g, '$1\n\n$2')
          .replace(/(```[a-zA-Z0-9_-]*)\s+([^\n]+)/g, '$1\n$2')
          .replace(/([^\n])\s*(```)/g, '$1\n\n$2');

        if (window.marked) {
          try {
            const renderer = new window.marked.Renderer();
            renderer.code = (code, language) => {
              const codeStr = typeof code === 'object' && code !== null ? (code.text || code.code || "") : String(code || "");
              const langStr = typeof language === 'object' && language !== null ? (language.lang || "code") : (typeof code === 'object' ? (code.lang || "code") : (language || "code"));
              const lang = (langStr || "code").toLowerCase();
              const encodedCode = encodeURIComponent(codeStr.trim());
              return `<div class="my-6 rounded-2xl overflow-hidden border border-slate-700/80 shadow-2xl bg-slate-900 animate-fadeIn">
                <div class="bg-slate-800/95 px-4 py-3 flex items-center justify-between border-b border-slate-700/60 text-xs text-slate-300 font-mono">
                  <span class="flex items-center space-x-2 font-bold">
                    <span class="h-2.5 w-2.5 rounded-full bg-emerald-400 animate-pulse"></span>
                    <span class="uppercase tracking-wider text-indigo-300">${lang}</span>
                  </span>
                  <div class="flex items-center space-x-2">
                    <button onclick="window.copyCode(this, '${encodedCode}')" class="hover:text-white px-3 py-1.5 rounded-lg bg-slate-700/60 hover:bg-slate-700 transition-colors flex items-center space-x-1.5 border border-slate-600/50 text-xs font-semibold">
                      <span>📋 Copy</span>
                    </button>
                    <button onclick="window.openCodeRunner('${lang}', '${encodedCode}')" class="hover:text-white px-3.5 py-1.5 rounded-lg bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-semibold transition-all flex items-center space-x-1.5 shadow-md shadow-indigo-500/20 border border-indigo-500/50 text-xs">
                      <span>▶️ Run Code</span>
                    </button>
                  </div>
                </div>
                <pre class="p-6 text-slate-100 font-mono text-sm overflow-x-auto leading-relaxed bg-slate-900/90"><code>${codeStr.trim()}</code></pre>
              </div>`;
            };
            renderer.heading = (text, level) => {
              const str = typeof text === 'object' && text !== null ? (text.text || text.raw || "") : String(text || "");
              const depth = typeof level === 'object' && level !== null ? (level.depth || level.level || 2) : (typeof text === 'object' ? (text.depth || 2) : (level || 2));
              const cleanText = str.replace(/\*\*/g, "").replace(/##+/g, "").trim();
              if (depth === 1) return `<h1 class="text-3xl lg:text-4xl font-extrabold text-slate-900 dark:text-white mt-8 mb-4 tracking-tight font-sans">${cleanText}</h1>`;
              if (depth === 2) return `<h2 class="text-2xl lg:text-3xl font-bold text-slate-800 dark:text-slate-100 mt-8 mb-4 tracking-tight font-sans border-b border-slate-200 dark:border-slate-800 pb-2">${cleanText}</h2>`;
              if (depth === 3) return `<h3 class="text-xl lg:text-2xl font-bold text-indigo-700 dark:text-indigo-400 mt-6 mb-3 font-sans">${cleanText}</h3>`;
              return `<h4 class="text-lg font-bold text-slate-700 dark:text-slate-300 mt-5 mb-2 font-sans">${cleanText}</h4>`;
            };
            renderer.list = (body, ordered) => {
              const bodyStr = typeof body === 'object' && body !== null ? (body.body || body.text || "") : String(body || "");
              const isOrdered = typeof ordered === 'object' && ordered !== null ? (ordered.ordered || false) : (typeof body === 'object' ? (body.ordered || false) : (ordered || false));
              const type = isOrdered ? "ol" : "ul";
              const className = isOrdered ? "list-decimal ml-6 my-3 space-y-1 text-slate-700 dark:text-slate-300" : "list-disc ml-6 my-3 space-y-1 text-slate-700 dark:text-slate-300";
              return `<${type} class="${className}">${bodyStr}</${type}>`;
            };
            renderer.paragraph = (text) => {
              const str = typeof text === 'object' && text !== null ? (text.text || text.raw || "") : String(text || "");
              return `<p class="my-3 leading-relaxed font-body text-slate-700 dark:text-slate-300 text-base lg:text-lg">${str}</p>`;
            };
            renderer.blockquote = (text) => {
              const str = typeof text === 'object' && text !== null ? (text.text || text.raw || "") : String(text || "");
              return `<blockquote class="border-l-4 border-indigo-500 bg-indigo-50/50 dark:bg-indigo-950/30 p-4 px-6 rounded-r-2xl my-5 text-indigo-950 dark:text-indigo-200 italic font-body shadow-sm">${str}</blockquote>`;
            };
            renderer.table = (header, body) => {
              const headStr = typeof header === 'object' && header !== null ? (header.header || header.text || "") : String(header || "");
              const bodyStr = typeof body === 'object' && body !== null ? (body.body || body.text || "") : String(body || "");
              return `<div class="my-6 overflow-x-auto rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm"><table class="w-full text-left border-collapse"><thead class="bg-slate-100 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">${headStr}</thead><tbody class="divide-y divide-slate-100 dark:divide-slate-800">${bodyStr}</tbody></table></div>`;
            };
            
            window.marked.use({ renderer });
            const html = window.marked.parse(contentStr, { async: false });
            const finalHtml = typeof html === 'string' ? html : String(html || "");
            return <div className="space-y-4 leading-relaxed font-body" dangerouslySetInnerHTML={{ __html: finalHtml }} />;
          } catch (e) {
            console.error("Marked parsing error:", e);
          }
        }
        
        // Safe fallback formatting if marked is unavailable
        let html = contentStr
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/###?\s*\*\*([^*]+)\*\*/g, '<h3 class="text-xl font-bold text-indigo-700 dark:text-indigo-400 mt-6 mb-3 font-sans">$1</h3>')

          .replace(/\n\n/g, '<p class="my-3 leading-relaxed font-body"></p>');

              {/* ─ Input ─ */}
              <div className="flex-shrink-0 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 py-3">
                <form onSubmit={handleSendTutor} className="flex items-center space-x-2">
                  <input
                    type="text"
                    placeholder="Ask about any chapter, concept or topic…"
                    value={tutorInput}
                    onChange={(e) => setTutorInput(e.target.value)}
                    disabled={tutorLoading}
                    className="flex-1 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:border-indigo-400 dark:focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-900 outline-none text-sm text-slate-800 dark:text-white placeholder-slate-400 rounded-xl px-4 py-2.5 transition-colors font-body disabled:opacity-50"
                  />
                  <button
                    type="submit"
                    disabled={tutorLoading || !tutorInput.trim()}
                    className="flex-shrink-0 h-10 w-10 rounded-xl bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed text-white flex items-center justify-center transition-colors shadow-md shadow-indigo-500/20"
                    aria-label="Send message"
                  >
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="h-4 w-4 translate-x-0.5">
                      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                  </button>
                </form>
                <p className="text-[10px] text-slate-400 dark:text-slate-600 text-center mt-2 font-body">Powered by Groq llama-3.3-70b · Full syllabus memory active</p>
              </div>
            </div>
          )}

        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
